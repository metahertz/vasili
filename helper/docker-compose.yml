services:
  vasili-helper:
    build:
      context: ..
      dockerfile: helper/Dockerfile
    image: vasili-helper:latest
    container_name: vasili-helper
    restart: unless-stopped
    # Tunneling backends need NET_ADMIN (ip link, iptables, sysctl).
    # SYS_MODULE is only needed if wireguard.ko isn't loaded on the host.
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8080:8080/tcp"
    environment:
      # Set HELPER_TOKEN to your own value to pin the UI bearer token.
      # If unset, the entrypoint generates one and prints it on first boot.
      HELPER_TOKEN: "${HELPER_TOKEN:-}"
      # Override public IP detection (otherwise tries ifconfig.me).
      PUBLIC_IP: "${PUBLIC_IP:-auto}"
    volumes:
      - helper-config:/etc/vasili-helper
      - helper-state:/var/lib/vasili-helper

volumes:
  helper-config:
  helper-state:
